name: jovio
description: Jovio — Telugu AI Receptionist
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Charts
  fl_chart: ^0.68.0

  # Razorpay
  razorpay_flutter: ^1.3.7

  # Local auth (biometric)
  local_auth: ^2.2.0

  # File/image picking
  file_picker: ^8.0.0
  image_picker: ^1.1.0

  # Notifications
  firebase_core: ^3.2.0
  firebase_messaging: ^15.0.4

  # Storage
  shared_preferences: ^2.3.0

  # HTTP
  http: ^1.2.1

  # UI extras
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
