<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Sign in to Jovio</title></head>
<body style="margin:0;padding:0;background:#0F1A2E;font-family:'Helvetica Neue',Arial,sans-serif;">

  <div style="background:#070B19;padding:32px 24px;text-align:center;">
    <span style="font-size:28px;font-weight:800;color:#F8FAFC;letter-spacing:3px;">
      JOV<span style="color:#F59E0B;">O</span>
    </span>
  </div>

  <div style="max-width:520px;margin:0 auto;padding:48px 32px;color:#D1D5DB;">
    <h1 style="color:#F8FAFC;font-size:24px;font-weight:800;margin:0 0 16px;">Sign in to Jovio</h1>
    <p style="font-size:15px;line-height:1.6;margin:0 0 24px;">
      Tap the button to sign in. The link expires in 1 hour.
    </p>

    <table cellpadding="0" cellspacing="0" border="0" style="margin:32px 0;">
      <tr>
        <td style="border-radius:10px;background:linear-gradient(135deg,#F59E0B 0%,#00E676 100%);">
          <a href="{{ .ConfirmationURL }}"
             style="display:inline-block;padding:14px 32px;font-weight:800;font-size:15px;color:#070B19;text-decoration:none;">
            Sign in →
          </a>
        </td>
      </tr>
    </table>

    <p style="font-size:13px;color:#9CA3AF;margin:0 0 24px;">
      Didn't request this? Someone may have typed your email by mistake.
      You can ignore it safely — no action needed.
    </p>
  </div>

  <div style="text-align:center;padding:24px;font-size:12px;color:#6B7280;">
    © 2026 Jovio Global Technologies · <a href="mailto:support@jovio.in" style="color:#6B7280;">support@jovio.in</a>
  </div>

</body>
</html>
